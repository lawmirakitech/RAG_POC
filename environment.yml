name: rag_env
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # base python + tooling (install with conda where possible)
  - python=3.10
  - pip
  - numpy
  - pydantic
  - requests
  - fastapi
  - uvicorn
  - streamlit
  - jupyter
  # PyTorch (conda/pytorch channel) - chooses CPU build if there's no CUDA configured.
  - pytorch
  - torchvision
  - torchaudio

  # use pip for the ecosystem packages that are pip-first or community:
  - pip:
      # langchain ecosystem
      - langchain
      - langchain-openai          # provides the langchain_openai module (fixes ModuleNotFoundError)
      - langchain-community      # community integrations (callbacks manager etc.)

      # LLM / OpenAI
      - openai
      - tiktoken

      # RAG and embeddings
      - sentence-transformers
      - transformers
      - tokenizers

      # Weaviate client (pip)
      - weaviate-client

      # PDF / PDF parsing (provides `fitz` import via PyMuPDF)
      - pymupdf                   # PyMuPDF (installation docs recommend this name)
      - PyPDF2                    # additional PDF utilities (optional but often useful)

      # Docling / parsers you referenced
      - docling-parse

      # HTTP and async libraries used by uvicorn/httpx/langchain integrations
      - httpx
      - httpcore
      - httptools
      - uvloop
      - anyio
      - watchfiles

      # useful utilities and extras
      - python-dotenv
      - python-multipart
      - opencv-python-headless
      - sentencepiece

      # If you need exact packages from your previously exported list,
      # add them here (one-per-line). Example placeholders:
      # - langchain-community==0.3.29
      # - langchain-openai==0.1.0
